<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7C3AED" />
    <title>Agenda 2026</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f3f4f6;
        --color-text-primary: #111827;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.2);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f0f0f; color: #f9fafb; }
        :root {
          --color-background-primary: #1f2937;
          --color-background-secondary: #111827;
          --color-text-primary: #f9fafb;
          --color-text-secondary: #9ca3af;
          --color-text-tertiary: #6b7280;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
        }
      }
      input, select, button { font-family: inherit; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
